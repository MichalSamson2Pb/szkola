<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(let x=1; x<11; x++){
            let img = document.createElement('img')
            img.className = 'zdjecia'
            img.title = x
            img.src = x + '.jpg'
            document.body.appendChild(img)
        }
    </script>
</body>
</html>
